<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bggrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>

  <!-- Background - dark like TCL boxes -->
  <rect width="200" height="200" rx="16" fill="url(#bggrad)"/>

  <!-- Red rectangle accent - TCL style top-left rounded corner -->
  <rect x="0" y="0" width="200" height="200" rx="16" fill="none" stroke="#e8000d" stroke-width="4"/>

  <!-- TCL big bold letters - TCL uses wide bold sans-serif -->
  <text x="100" y="88"
    font-family="'Arial Black', 'Franklin Gothic Heavy', Impact, sans-serif"
    font-size="58"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    letter-spacing="-1">TCL</text>

  <!-- Divider line -->
  <rect x="20" y="98" width="160" height="3" fill="#e8000d"/>

  <!-- TV TÜRK alt yazı -->
  <text x="100" y="125"
    font-family="'Arial Black', 'Franklin Gothic Heavy', Impact, sans-serif"
    font-size="20"
    font-weight="900"
    fill="#e8000d"
    text-anchor="middle"
    letter-spacing="3">TV</text>

  <text x="100" y="152"
    font-family="'Arial Black', 'Franklin Gothic Heavy', Impact, sans-serif"
    font-size="16"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    letter-spacing="6">TÜRK</text>

  <!-- Small red dot decoration like TCL branding -->
  <circle cx="100" cy="172" r="4" fill="#e8000d"/>
</svg>
